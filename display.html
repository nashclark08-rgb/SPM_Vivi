<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PTI Display</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --primary:    #1565C0;
            --secondary:  #FFFFFF;
            --waiting-bg: #37474F;
            --done-bg:    #2E7D32;
        }

        html, body {
            width: 100%; height: 100%;
            overflow: hidden;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            display: flex;
            flex-direction: column;
            background: var(--waiting-bg);
            color: var(--secondary);
            transition: background 0.6s ease;
        }

        /* ── Header ─────────────────────────────────── */
        .hdr {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 0.85rem 1.75rem;
            background: rgba(0,0,0,0.18);
            flex-shrink: 0;
        }
        .hdr img { height: 46px; width: auto; display: none; }
        .hdr-text { display: flex; flex-direction: column; gap: 0.05rem; }
        .hdr .school { font-size: clamp(1rem, 2.2vw, 1.6rem); font-weight: 600; opacity: 0.95; line-height: 1.2; }
        .hdr .session-name { font-size: clamp(0.7rem, 1.4vw, 1rem); font-weight: 400; opacity: 0.78; line-height: 1.2; }

        /* ── Main area ───────────────────────────────── */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 1.5rem 2rem;
            position: relative;
        }

        /* Watermark logo */
        .watermark {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: min(58vw, 58vh);
            height: min(58vw, 58vh);
            object-fit: contain;
            opacity: 0.07;
            pointer-events: none;
            user-select: none;
            display: none;
        }

        /* Active timer */
        #timerView { display: none; text-align: center; position: relative; z-index: 1; }

        .status-label {
            font-size: clamp(1.4rem, 3.8vw, 3.2rem);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            opacity: 0.88;
            margin-bottom: 0.3rem;
        }

        .timer {
            font-size: clamp(6rem, 21vw, 21rem);
            font-weight: 800;
            font-variant-numeric: tabular-nums;
            line-height: 1;
            letter-spacing: -0.02em;
            text-shadow: 0 6px 30px rgba(0,0,0,0.25);
            -webkit-text-stroke: 2px rgba(255,255,255,0.55);
            paint-order: stroke fill;
        }

        .sub {
            margin-top: 1.4rem;
            opacity: 0.82;
            text-align: center;
        }
        .next-time {
            font-size: clamp(0.9rem, 2.2vw, 1.6rem);
        }

        /* Waiting view */
        #waitingView { display: none; text-align: center; }
        .waiting-label {
            font-size: clamp(1.2rem, 3vw, 2.5rem);
            font-weight: 600;
            opacity: 0.85;
            margin-bottom: 0.5rem;
        }
        .waiting-time {
            font-size: clamp(3rem, 12vw, 10rem);
            font-weight: 800;
            font-variant-numeric: tabular-nums;
            line-height: 1.1;
        }

        /* Complete view */
        #completeView { display: none; text-align: center; }
        .complete-title {
            font-size: clamp(3rem, 9vw, 8rem);
            font-weight: 800;
            line-height: 1.1;
        }
        .complete-sub {
            margin-top: 1rem;
            font-size: clamp(1rem, 2.8vw, 2.2rem);
            opacity: 0.82;
        }

        /* QR Code */
        .qr-wrap {
            position: absolute;
            bottom: 1.4rem;
            right: 1.6rem;
            text-align: center;
        }
        #qrcode {
            background: white;
            padding: 8px;
            border-radius: 8px;
            display: inline-block;
            line-height: 0;
        }
        .qr-label {
            font-size: clamp(0.9rem, 1.6vw, 1.25rem);
            opacity: 0.92;
            margin-top: 0.5rem;
            font-weight: 500;
        }

        /* ── Footer bar ──────────────────────────────── */
        .ftr { height: 7px; background: rgba(0,0,0,0.2); flex-shrink: 0; }

        /* State backgrounds — interview/break set dynamically via JS; waiting/complete use these */
        body.s-waiting  { background: var(--waiting-bg); color: #FFFFFF; }
        body.s-complete { background: var(--done-bg);    color: #FFFFFF; }

        .hidden { display: none !important; }

        /* ── Fullscreen button ───────────────────────── */
        .fs-btn {
            position: fixed;
            top: 0.65rem;
            right: 0.7rem;
            background: rgba(0,0,0,0.28);
            border: 1px solid rgba(255,255,255,0.22);
            color: rgba(255,255,255,0.85);
            border-radius: 6px;
            padding: 0.38rem 0.65rem;
            font-size: 1.1rem;
            cursor: pointer;
            z-index: 200;
            opacity: 0;
            transition: opacity 0.4s, background 0.15s;
            user-select: none;
            line-height: 1;
        }
        .fs-btn:hover { background: rgba(0,0,0,0.5); opacity: 1 !important; }

        /* ── Online teacher panel ────────────────────── */
        .online-panel {
            position: absolute;
            bottom: 1.4rem;
            left: 1.6rem;
            text-align: left;
            max-width: 42%;
        }
        .online-panel-title {
            font-size: clamp(0.7rem, 1.1vw, 0.9rem);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            opacity: 0.72;
            margin-bottom: 0.5rem;
        }
        .online-name {
            display: flex;
            align-items: center;
            gap: 0.45rem;
            font-size: clamp(0.85rem, 1.5vw, 1.15rem);
            font-weight: 600;
            margin-bottom: 0.3rem;
            opacity: 0.92;
        }
        .online-dot {
            width: 9px; height: 9px;
            background: #FF5252;
            border-radius: 50%;
            flex-shrink: 0;
            animation: opulse 1.6s ease-in-out infinite;
        }
        @keyframes opulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50%       { opacity: 0.45; transform: scale(0.75); }
        }
    </style>
</head>
<body class="s-waiting">
<button class="fs-btn" id="fsBtn" onclick="toggleFullscreen()" title="Toggle fullscreen">&#x26F6;</button>

    <!-- Header -->
    <header class="hdr">
        <img id="hdrLogo" src="" alt="">
        <div class="hdr-text">
            <span class="school" id="hdrSchool">Parent Teacher Interviews</span>
            <span class="session-name" id="hdrSession"></span>
        </div>
    </header>

    <!-- Main -->
    <main class="main">

        <!-- Watermark logo (shown during interview & break) -->
        <img id="watermark" class="watermark" src="" alt="">

        <!-- Timer view -->
        <div id="timerView">
            <div class="status-label" id="statusLabel">Loading…</div>
            <div class="timer" id="timerDigits">--:--</div>
            <div class="sub">
                <div class="next-time" id="nextTime"></div>
            </div>
        </div>

        <!-- Waiting view -->
        <div id="waitingView">
            <div class="waiting-label">Session begins at</div>
            <div class="waiting-time" id="waitingTime">--:--</div>
        </div>

        <!-- Complete view -->
        <div id="completeView">
            <div class="complete-title">Session Complete</div>
            <div class="complete-sub">Thank you for attending.</div>
        </div>

        <!-- Online Teacher Panel -->
        <div class="online-panel" id="onlinePanel" style="display:none">
            <div class="online-panel-title">&#128250; In Online Meeting</div>
            <div id="onlineNames"></div>
        </div>

        <!-- QR Code -->
        <div class="qr-wrap" id="qrWrap">
            <div id="qrcode"></div>
            <div class="qr-label">Scan for teacher locations</div>
        </div>

    </main>

    <!-- Footer -->
    <footer class="ftr"></footer>

    <!-- QR Code library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"
            onerror="document.getElementById('qrWrap').style.display='none'"></script>

    <script>
    // ── Storage ───────────────────────────────────────────────────────
    function loadSettings() {
        try { return JSON.parse(localStorage.getItem('pti_settings')) || {}; } catch { return {}; }
    }

    // ── Helpers ───────────────────────────────────────────────────────
    function pad(n) { return String(Math.max(0, Math.floor(n))).padStart(2, '0'); }

    function fmtCountdown(secs) {
        const s = Math.max(0, Math.round(secs));
        return `${pad(s / 60)}:${pad(s % 60)}`;
    }

    function timeStrToDate(hhmm) {
        const [h, m] = hhmm.split(':').map(Number);
        const d = new Date();
        d.setHours(h, m, 0, 0);
        return d;
    }

    function fmt12h(date) {
        let h = date.getHours(), m = date.getMinutes();
        const p = h >= 12 ? 'PM' : 'AM';
        return `${h % 12 || 12}:${pad(m)} ${p}`;
    }

    // ── Audio ─────────────────────────────────────────────────────────
    function _tone(ctx, type, freq, gain, start, stop) {
        const osc = ctx.createOscillator(), g = ctx.createGain();
        osc.connect(g); g.connect(ctx.destination);
        osc.type = type; osc.frequency.value = freq;
        const t0 = ctx.currentTime;
        g.gain.setValueAtTime(gain, t0 + start);
        g.gain.exponentialRampToValueAtTime(0.001, t0 + stop);
        osc.start(t0 + start); osc.stop(t0 + stop + 0.05);
    }
    const SOUND_DEFS = {
        'Descending Chime': c => { [[880,0],[660,0.42],[440,0.84]].forEach(([f,t])=>_tone(c,'sine',f,0.55,t,t+0.65)); },
        'Ascending Beep':   c => { [[440,0],[660,0.18],[440,0.55],[880,0.73]].forEach(([f,t])=>_tone(c,'square',f,0.18,t,t+0.14)); },
        'Single Bell':      c => { _tone(c,'sine',880,0.6,0,1.2); },
        'School Bell':      c => { for(let i=0;i<8;i++) _tone(c,'square',700,0.18,i*0.11,i*0.11+0.07); },
        'Soft Ding':        c => { _tone(c,'sine',1047,0.35,0,0.9); },
        'Double Tone':      c => { _tone(c,'sine',660,0.45,0,0.3); _tone(c,'sine',880,0.45,0.38,0.68); },
        'Alert Buzz':       c => { _tone(c,'square',200,0.3,0,0.5); },
        'Xylophone Hit':    c => { _tone(c,'triangle',1175,0.7,0,0.38); },
        'Low Gong':         c => { _tone(c,'sine',110,0.6,0,1.5); _tone(c,'sine',220,0.25,0,0.8); },
        'High Ping':        c => { _tone(c,'sine',2093,0.45,0,0.2); }
    };
    function _loadSounds() {
        try { return JSON.parse(localStorage.getItem('pti_sounds')) || {}; } catch { return {}; }
    }
    function _playSound(name) {
        const fn = SOUND_DEFS[name] || SOUND_DEFS['Descending Chime'];
        try { const ctx = new (window.AudioContext||window.webkitAudioContext)(); fn(ctx); }
        catch(e) { console.warn('Audio:', e); }
    }
    function playEndOfInterview() {
        const s = _loadSounds();
        _playSound(s.endInterview || 'Descending Chime');
    }
    function playEndOfBreak() {
        const s = _loadSounds();
        _playSound(s.endBreak || 'Ascending Beep');
    }

    // ── State calculation ─────────────────────────────────────────────
    function getState(cfg) {
        const now        = new Date();
        const start      = timeStrToDate(cfg.startTime);
        const ivSecs     = cfg.interviewDuration * 60;
        const brkSecs    = (cfg.breakDuration || 0) * 60;
        const cycleSecs  = ivSecs + brkSecs;
        const total      = cfg.numberOfInterviews || 0;

        if (now < start) {
            return { phase: 'waiting', startTime: start };
        }

        const elapsed = (now - start) / 1000;

        // No-break case
        if (brkSecs === 0) {
            const idx = Math.floor(elapsed / ivSecs);
            if (idx >= total) return { phase: 'complete', total };
            const tLeft = ivSecs - (elapsed % ivSecs);
            const nextStart = new Date(start.getTime() + (idx + 1) * ivSecs * 1000);
            return { phase: 'interview', timeLeft: tLeft, interviewNumber: idx + 1, total, nextInterviewTime: nextStart };
        }

        const cycleIdx  = Math.floor(elapsed / cycleSecs);
        const posInCycle = elapsed % cycleSecs;

        if (cycleIdx >= total) return { phase: 'complete', total };

        const ivNum      = cycleIdx + 1;
        const nextStart  = new Date(start.getTime() + (cycleIdx + 1) * cycleSecs * 1000);

        if (posInCycle < ivSecs) {
            return { phase: 'interview', timeLeft: ivSecs - posInCycle, interviewNumber: ivNum, total, nextInterviewTime: nextStart };
        }

        // Break — if last interview just ended, show complete
        if (ivNum >= total) return { phase: 'complete', total };

        return { phase: 'break', timeLeft: cycleSecs - posInCycle, interviewNumber: ivNum, total, nextInterviewTime: nextStart };
    }

    // ── Render ────────────────────────────────────────────────────────
    let prevPhase = null;
    let cfg       = {};

    const views = {
        timer:    document.getElementById('timerView'),
        waiting:  document.getElementById('waitingView'),
        complete: document.getElementById('completeView'),
    };

    function showOnly(key) {
        Object.entries(views).forEach(([k, el]) => el.style.display = (k === key) ? 'block' : 'none');
    }

    function tick() {
        const state = getState(cfg);

        // Sound cues on phase transition
        if (prevPhase !== null && prevPhase !== state.phase) {
            if (state.phase === 'break')    playEndOfInterview();
            if (state.phase === 'interview' && prevPhase === 'break') playEndOfBreak();
            if (state.phase === 'complete'  && prevPhase === 'interview') playEndOfInterview();
        }
        prevPhase = state.phase;

        // Body state class + dynamic colours
        document.body.className = `s-${state.phase}`;
        const wm = document.getElementById('watermark');
        if (state.phase === 'interview') {
            document.body.style.background = cfg.primaryColour  || '#1565C0';
            document.body.style.color      = cfg.secondaryColour || '#FFFFFF';
            wm.style.display = 'block';
        } else if (state.phase === 'break') {
            document.body.style.background = cfg.secondaryColour || '#FFFFFF';
            document.body.style.color      = cfg.primaryColour   || '#1565C0';
            wm.style.display = 'block';
        } else {
            document.body.style.background = '';
            document.body.style.color      = '';
            wm.style.display = 'none';
        }

        if (state.phase === 'waiting') {
            showOnly('waiting');
            document.getElementById('waitingTime').textContent = fmt12h(state.startTime);

        } else if (state.phase === 'complete') {
            showOnly('complete');

        } else {
            showOnly('timer');
            const isInterview = state.phase === 'interview';
            document.getElementById('statusLabel').textContent = isInterview ? 'Interview in Progress' : 'Break Time';
            document.getElementById('timerDigits').textContent = fmtCountdown(state.timeLeft);

            if (!isInterview) {
                document.getElementById('nextTime').textContent = `Next interview at ${fmt12h(state.nextInterviewTime)}`;
            } else if (state.interviewNumber < state.total) {
                document.getElementById('nextTime').textContent = `Next interview at ${fmt12h(state.nextInterviewTime)}`;
            } else {
                document.getElementById('nextTime').textContent = 'Final interview';
            }
        }
    }

    // ── Init ──────────────────────────────────────────────────────────
    function init() {
        cfg = loadSettings();

        // Apply branding
        if (cfg.primaryColour)   document.documentElement.style.setProperty('--primary', cfg.primaryColour);
        if (cfg.secondaryColour) {
            document.documentElement.style.setProperty('--secondary', cfg.secondaryColour);
            document.body.style.color = cfg.secondaryColour;
        }
        if (cfg.schoolName) document.getElementById('hdrSchool').textContent = cfg.schoolName;
        if (cfg.sessionName) document.getElementById('hdrSession').textContent = cfg.sessionName;
        if (cfg.logoDataUrl) {
            const img = document.getElementById('hdrLogo');
            img.src = cfg.logoDataUrl;
            img.style.display = 'block';
            document.getElementById('watermark').src = cfg.logoDataUrl;
        }

        // QR code — embed teacher data + timing in URL hash so phones (with empty localStorage) work
        const base = window.location.href.replace(/[^/]*$/, '');
        let roomsUrl = base + 'rooms.html';
        try {
            const teachers = JSON.parse(localStorage.getItem('pti_teachers') || '[]');
            const payload = {
                t:  teachers.map(t => ({ n: t.name || '', s: t.subject || '', r: t.room || '' })),
                sn: cfg.schoolName    || '',
                ev: cfg.sessionName   || '',
                p:  cfg.primaryColour   || '#1565C0',
                sc: cfg.secondaryColour || '#FFFFFF',
                st: cfg.startTime          || '',
                iv: cfg.interviewDuration  || 0,
                bk: cfg.breakDuration      || 0,
                ni: cfg.numberOfInterviews || 0
            };
            const encoded = btoa(unescape(encodeURIComponent(JSON.stringify(payload))));
            roomsUrl = base + 'rooms.html#' + encoded;
        } catch(e) { /* fall back to plain URL */ }

        try {
            new QRCode(document.getElementById('qrcode'), {
                text: roomsUrl,
                width: 148,
                height: 148,
                colorDark: '#000000',
                colorLight: '#ffffff',
                correctLevel: QRCode.CorrectLevel.L
            });
        } catch (e) {
            document.getElementById('qrWrap').style.display = 'none';
        }

        tick();
        // Align to the next whole-second boundary so this display and
        // the rooms.html phone timer always show the same digit simultaneously
        setTimeout(() => { tick(); setInterval(tick, 1000); }, 1000 - (Date.now() % 1000));

        // Online teachers (if Firebase configured)
        pollOnline();
        setInterval(pollOnline, 5000);
    }

    // ── Fullscreen ────────────────────────────────────────────────
    function toggleFullscreen() {
        if (!document.fullscreenElement) {
            document.documentElement.requestFullscreen().catch(e => console.warn(e));
        } else {
            document.exitFullscreen();
        }
    }
    document.addEventListener('fullscreenchange', function () {
        const btn = document.getElementById('fsBtn');
        btn.innerHTML = document.fullscreenElement ? '&#x229F;' : '&#x26F6;';
        btn.title = document.fullscreenElement ? 'Exit fullscreen' : 'Toggle fullscreen';
    });
    let _fsHide;
    function _bumpFs() {
        const b = document.getElementById('fsBtn');
        b.style.opacity = '1';
        clearTimeout(_fsHide);
        _fsHide = setTimeout(() => { b.style.opacity = '0'; }, 3000);
    }
    document.addEventListener('mousemove', _bumpFs);
    document.addEventListener('touchstart', _bumpFs, { passive: true });

    // ── Online Teachers (Firebase Realtime DB REST poll) ──────────
    function _fbUrl() { return (localStorage.getItem('pti_firebase_url') || '').replace(/\/$/, ''); }

    function pollOnline() {
        const url = _fbUrl(); if (!url) return;
        fetch(url + '/pti-online.json')
            .then(r => r.ok ? r.json() : null)
            .then(data => {
                const now = Date.now(), names = [];
                if (data && typeof data === 'object') {
                    Object.values(data).forEach(e => {
                        if (e && e.name && e.until > now) names.push(e.name);
                    });
                }
                const panel = document.getElementById('onlinePanel');
                if (names.length) {
                    document.getElementById('onlineNames').innerHTML =
                        names.map(n => `<div class="online-name"><span class="online-dot"></span>${n}</div>`).join('');
                    panel.style.display = 'block';
                } else {
                    panel.style.display = 'none';
                }
            })
            .catch(() => {});
    }

    window.addEventListener('load', init);
    </script>
</body>
</html>
